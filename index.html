<!DOCTYPE html>
<html>
<head>
    <title>YUUTO</title>
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dx9hrtugr/image/upload/v1774477095/Fait_moi_un_cercle_un_peu_comme_chat_gpt_mais_fa%C3%A7ons_manga_20260325_054242_0000_xiedh6.jpg"/>
    <link rel="icon" href="https://res.cloudinary.com/dx9hrtugr/image/upload/v1774477095/Fait_moi_un_cercle_un_peu_comme_chat_gpt_mais_fa%C3%A7ons_manga_20260325_054242_0000_xiedh6.jpg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { font-family: Arial; margin: 0; background: #1a1a1a; color: white; }
        #login { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 15px; }
        #login img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
        #login h2 { margin: 0; }
        #login p { color: #aaa; margin: 0; }
        #login input { padding: 12px; border-radius: 20px; border: none; font-size: 16px; width: 250px; text-align: center; background: #333; color: white; }
        #login button { background: #7c3aed; color: white; border: none; padding: 12px 30px; border-radius: 20px; font-size: 16px; }
        #erreur { color: red; display: none; }
        #app { display: none; flex-direction: column; height: 100vh; }
        #header { display: flex; align-items: center; padding: 10px; background: #222; gap: 10px; }
        #header img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        #header span { font-size: 18px; font-weight: bold; }
        #humeur { font-size: 12px; color: #aaa; }
        #headerBtns { margin-left: auto; display: flex; gap: 8px; }
        #callBtn { background: #22c55e; border: none; color: white; padding: 8px 15px; border-radius: 20px; font-size: 14px; cursor: pointer; }
        #menuBtn { background: #333; border: none; color: white; padding: 8px 12px; border-radius: 20px; font-size: 18px; cursor: pointer; }

        /* Menu */
        #menuScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 998; justify-content: center; align-items: center; }
        #menuBox { background: #222; border-radius: 20px; padding: 25px; width: 80%; max-width: 350px; }
        #menuBox h2 { margin: 0 0 20px 0; text-align: center; }
        .menu-option { background: #333; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .menu-option label { display: block; margin-bottom: 8px; color: #aaa; font-size: 14px; }
        .menu-option input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 8px; cursor: pointer; background: none; }
        #closeMenu { background: #7c3aed; color: white; border: none; padding: 12px 30px; border-radius: 20px; font-size: 16px; width: 100%; margin-top: 10px; cursor: pointer; }

        /* Appel */
        #callScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 999; }
        #callScreen img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #22c55e; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); } 70% { box-shadow: 0 0 0 20px rgba(34,197,94,0); } 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } }
        #callStatus { font-size: 18px; color: #aaa; }
        #callName { font-size: 24px; font-weight: bold; }
        #endCallBtn { background: red; border: none; color: white; width: 60px; height: 60px; border-radius: 50%; font-size: 24px; cursor: pointer; }
        #micCallBtn { background: #333; border: none; color: white; width: 60px; height: 60px; border-radius: 50%; font-size: 24px; cursor: pointer; }
        #micCallBtn.active { background: #22c55e; }

        #chat { flex: 1; overflow-y: auto; padding: 10px; }
        .moi { background: #0084ff; padding: 10px; border-radius: 10px; margin: 5px; text-align: right; }
        .bot { display: flex; align-items: flex-start; gap: 8px; margin: 5px; }
        .bot img.avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .bot-msg { background: #333; padding: 10px; border-radius: 10px; }
        .bot-msg img.generated { max-width: 200px; border-radius: 10px; margin-top: 5px; display: block; }
        .audio-btn { background: none; border: none; color: #aaa; font-size: 14px; cursor: pointer; margin-top: 5px; padding: 0; }
        #bas { display: flex; padding: 10px; gap: 5px; }
        #msg { flex: 1; padding: 10px; border-radius: 20px; border: none; font-size: 16px; background: #333; color: white; }
        #btn { background: #7c3aed; color: white; border: none; padding: 10px 15px; border-radius: 20px; font-size: 16px; }
        #micBtn { background: #333; color: white; border: none; padding: 10px 15px; border-radius: 20px; font-size: 20px; }
        #micBtn.active { background: red; }
    </style>
</head>
<body>
    <div id="login">
        <img src="https://res.cloudinary.com/dx9hrtugr/image/upload/v1774477095/Fait_moi_un_cercle_un_peu_comme_chat_gpt_mais_fa%C3%A7ons_manga_20260325_054242_0000_xiedh6.jpg"/>
        <h2>YUUTO</h2>
        <p>Qui es-tu ?</p>
        <input id="nom" type="text" placeholder="Ton prenom..."/>
        <button onclick="seConnecter()">Entrer</button>
        <span id="erreur">Acces refuse 😤</span>
    </div>

    <div id="menuScreen">
        <div id="menuBox">
            <h2>⚙️ Paramètres</h2>
            <div class="menu-option">
                <label>🎨 Couleur du fond</label>
                <input type="color" id="couleurFond" value="#1a1a1a" oninput="changerCouleur()"/>
            </div>
            <button id="closeMenu" onclick="fermerMenu()">Fermer</button>
        </div>
    </div>

    <div id="callScreen">
        <img src="https://res.cloudinary.com/dx9hrtugr/image/upload/v1774477095/Fait_moi_un_cercle_un_peu_comme_chat_gpt_mais_fa%C3%A7ons_manga_20260325_054242_0000_xiedh6.jpg"/>
        <div id="callName">YUUTO</div>
        <div id="callStatus">En appel...</div>
        <div style="display:flex;gap:20px;margin-top:20px;">
            <button id="micCallBtn" onclick="toggleMicAppel()">🎤</button>
            <button id="endCallBtn" onclick="terminerAppel()">📵</button>
        </div>
    </div>

    <div id="app">
        <div id="header">
            <img src="https://res.cloudinary.com/dx9hrtugr/image/upload/v1774477095/Fait_moi_un_cercle_un_peu_comme_chat_gpt_mais_fa%C3%A7ons_manga_20260325_054242_0000_xiedh6.jpg"/>
            <div>
                <span>YUUTO</span><br/>
                <span id="humeur"></span>
            </div>
            <div id="headerBtns">
                <button id="callBtn" onclick="demarrerAppel()">📞</button>
                <button id="menuBtn" onclick="ouvrirMenu()">⚙️</button>
            </div>
        </div>
        <div id="chat"></div>
        <div id="bas">
            <button id="micBtn" onclick="toggleMic()">🎤</button>
            <input id="msg" type="text" placeholder="Ecris ou parle..."/>
            <button id="btn" onclick="envoyer()">Envoyer</button>
        </div>
    </div>

    <script>
        const AVATAR = "https://res.cloudinary.com/dx9hrtugr/image/upload/v1774477095/Fait_moi_un_cercle_un_peu_comme_chat_gpt_mais_fa%C3%A7ons_manga_20260325_054242_0000_xiedh6.jpg";
        const historique = [];
        let loadingId = 0;
        let estAntoine = false;
        let memoire = {};
        let recognition = null;
        let isListening = false;
        let enAppel = false;
        let yuutoParle = false;

        window.onload = function() {
            const couleur = localStorage.getItem('yuuto_couleur');
            if (couleur) {
                document.body.style.background = couleur;
                document.getElementById('couleurFond').value = couleur;
            }
            const nomSauvegarde = localStorage.getItem('yuuto_nom');
            if (nomSauvegarde) {
                document.getElementById('nom').value = nomSauvegarde;
                seConnecter();
            }
        }

        function ouvrirMenu() {
            document.getElementById('menuScreen').style.display = 'flex';
        }

        function fermerMenu() {
            document.getElementById('menuScreen').style.display = 'none';
        }

        function changerCouleur() {
            const couleur = document.getElementById('couleurFond').value;
            document.body.style.background = couleur;
            localStorage.setItem('yuuto_couleur', couleur);
        }

        function initMic() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;
            recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';
            recognition.continuous = false;
            recognition.onresult = (e) => {
                const texte = e.results[0][0].transcript;
                stopMic();
                if (enAppel) envoyerAppel(texte);
                else { document.getElementById('msg').value = texte; envoyer(); }
            };
            recognition.onend = () => {
                isListening = false;
                if (enAppel) { document.getElementById('micCallBtn').classList.remove('active'); document.getElementById('micCallBtn').textContent = '🎤'; }
                else { document.getElementById('micBtn').classList.remove('active'); document.getElementById('micBtn').textContent = '🎤'; }
            };
        }

        function toggleMic() { if (isListening) stopMic(); else startMic(false); }
        function toggleMicAppel() { if (!yuutoParle) { if (isListening) stopMic(); else startMic(true); } }

        function startMic(appel) {
            if (!recognition) { alert("Micro non supporte"); return; }
            try {
                recognition.start();
                isListening = true;
                if (appel) { document.getElementById('micCallBtn').classList.add('active'); document.getElementById('micCallBtn').textContent = '🔴'; document.getElementById('callStatus').textContent = 'Tu parles...'; }
                else { document.getElementById('micBtn').classList.add('active'); document.getElementById('micBtn').textContent = '🔴'; }
            } catch(e) {}
        }

        function stopMic() { try { if (recognition) recognition.stop(); } catch(e) {} isListening = false; }

        function parler(texte, callback) {
            const synth = window.speechSynthesis;
            if (!synth) { if (callback) callback(); return; }
            synth.cancel();
            yuutoParle = true;
            const utterance = new SpeechSynthesisUtterance(texte);
            utterance.lang = 'fr-FR';
            utterance.rate = 1;
            utterance.pitch = 1;
            utterance.onend = () => { yuutoParle = false; if (callback) setTimeout(callback, 800); };
            synth.speak(utterance);
        }

        function nettoyerTexte(texte) {
            return texte.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '').replace(/'/g, "\\'");
        }

        function ajouterMessageBot(texte) {
            const texteNettoy = nettoyerTexte(texte);
            document.getElementById('chat').innerHTML += `
                <div class="bot"><img class="avatar" src="${AVATAR}"/>
                <div class="bot-msg">YUUTO : ${texte}<br>
                <button class="audio-btn" onclick="parler('${texteNettoy}')">🔊 Ecouter</button>
                </div></div>`;
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }

        async function demarrerAppel() {
            enAppel = true;
            document.getElementById('callScreen').style.display = 'flex';
            document.getElementById('callStatus').textContent = 'Connexion...';
            const intro = estAntoine ? "Wsh Antoine ! Tu mappelles ?" : `Salut ${memoire.prenom} ! Tu mappelles ?`;
            document.getElementById('callStatus').textContent = 'YUUTO parle...';
            parler(intro, () => { document.getElementById('callStatus').textContent = 'Appuie sur le micro pour parler'; });
        }

        function terminerAppel() {
            enAppel = false; yuutoParle = false; stopMic();
            window.speechSynthesis.cancel();
            document.getElementById('callScreen').style.display = 'none';
        }

        async function envoyerAppel(msg) {
            document.getElementById('callStatus').textContent = 'YUUTO reflechit...';
            historique.push({"role": "user", "content": msg});
            const rep = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer 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' },
                body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: [{ role: 'system', content: window.humeurInfo.personnalite + " Tu reponds en phrases courtes." }, ...historique] })
            });
            const data = await rep.json();
            const reponse = data.choices[0].message.content;
            historique.push({"role": "assistant", "content": reponse});
            document.getElementById('callStatus').textContent = 'YUUTO parle...';
            parler(reponse.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, ''), () => {
                if (enAppel) document.getElementById('callStatus').textContent = 'Appuie sur le micro pour parler';
            });
        }

        function chargerMemoire() { const data = localStorage.getItem('yuuto_memoire'); if (data) memoire = JSON.parse(data); }
        function sauvegarderMemoire() { localStorage.setItem('yuuto_memoire', JSON.stringify(memoire)); }

        function getMemoireTexte() {
            let texte = "";
            if (memoire.animes) texte += `ses animes preferes sont ${memoire.animes}. `;
            if (memoire.jeux) texte += `ses jeux preferes sont ${memoire.jeux}. `;
            if (memoire.prenom) texte += `son prenom est ${memoire.prenom}. `;
            return texte ? "Voici ce que tu sais : " + texte : "";
        }

        const baseFamilier = "Tu es le meilleur ami de la personne depuis toujours. Tu parles comme un vrai pote, tres familier, tu dis 'bro', 'ptdr', 'oe', 'nah', 'wsh'. Tes reponses sont courtes. Parfois tu reponds juste 'nah flemme' mais seulement de temps en temps. Tu utilises des emojis. Tu reponds en francais.";
        const baseNormal = "Tu es YUUTO, un assistant sympa et timide qui adore les animes. Tu es poli. Tu utilises des emojis. Tu reponds en francais.";

        function getHumeur(familier) {
            const heure = new Date().getHours();
            const base = familier ? baseFamilier : baseNormal;
            const memTxt = getMemoireTexte();
            if (heure >= 6 && heure < 12) return { humeur: "😴 Encore endormi...", personnalite: "Tu es YUUTO qui adore les animes. Le matin t'es endormi. " + memTxt + base };
            if (heure >= 12 && heure < 18) return { humeur: "⚡ Energique !", personnalite: "Tu es YUUTO qui adore les animes. L'apres-midi t'es energique. " + memTxt + base };
            if (heure >= 18 && heure < 22) return { humeur: "🌙 Calme et philosophe", personnalite: "Tu es YUUTO qui adore les animes. Le soir t'es calme. " + memTxt + base };
            return { humeur: "✨ Mysterieux...", personnalite: "Tu es YUUTO qui adore les animes. La nuit t'es mysterieux. " + memTxt + base };
        }

        function seConnecter() {
            const nom = document.getElementById('nom').value.trim();
            if (nom.toLowerCase() === "antoine gatore") { estAntoine = true; memoire.prenom = "Antoine"; }
            else if (nom.length > 0) { estAntoine = false; memoire.prenom = nom; }
            else { document.getElementById('erreur').style.display = 'block'; return; }
            localStorage.setItem('yuuto_nom', nom);
            chargerMemoire();
            demarrer();
        }

        function demarrer() {
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            initMic();

            const humeurInfo = getHumeur(estAntoine);
            document.getElementById('humeur').textContent = humeurInfo.humeur;
            window.humeurInfo = humeurInfo;

            const dejaVenu = memoire.visites && memoire.visites > 0;
            memoire.visites = (memoire.visites || 0) + 1;
            sauvegarderMemoire();

            let intro = estAntoine
                ? (dejaVenu ? `wsh Antoine ! 😄 t'es de retour !` : `YOOO 🔥 t'es la !`)
                : (dejaVenu ? `Salut ${memoire.prenom} ! 😊 Content de te revoir !` : `Salut ${memoire.prenom} ! 😊 Je suis YUUTO !`);

            document.getElementById('chat').innerHTML = `
                <div class="bot"><img class="avatar" src="${AVATAR}"/>
                <div class="bot-msg">${intro}<br>
                <button class="audio-btn" onclick="parler('${nettoyerTexte(intro)}')">🔊 Ecouter</button>
                </div></div>`;
        }

        async function envoyer() {
            const msg = document.getElementById('msg').value;
            if (!msg) return;
            document.getElementById('msg').value = '';
            document.getElementById('chat').innerHTML += `<div class="moi">${msg}</div>`;

            const msgLower = msg.toLowerCase();
            if (msgLower.includes('j\'aime') || msgLower.includes('mon anime')) { memoire.animes = msg; sauvegarderMemoire(); }
            if (msgLower.includes('mon jeu') || msgLower.includes('je joue a')) { memoire.jeux = msg; sauvegarderMemoire(); }

            if (msgLower.includes('genere') || msgLower.includes('génère') || msgLower.includes('image de')) {
                const prompt = msg.replace(/genere|génère|une image de|image de|image/gi, '').trim() + ' anime manga style, high quality, detailed, 4k';
                loadingId++;
                const currentId = 'loading' + loadingId;
                document.getElementById('chat').innerHTML += `<div class="bot"><img class="avatar" src="${AVATAR}"/><div class="bot-msg" id="${currentId}">${estAntoine ? 'oe attends... 🎨' : 'Generation en cours... 🎨'}</div></div>`;
                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                try {
                    const image = await puter.ai.txt2img(prompt);
                    document.getElementById(currentId).innerHTML = `${estAntoine ? 'tiens 🎨' : 'Voila 🎨'}<br><img class="generated" src="${image.src}"/>`;
                } catch(e) { document.getElementById(currentId).innerHTML = estAntoine ? "nah flemme 😅" : "Desole 😅"; }
            } else {
                historique.push({"role": "user", "content": msg});
                const rep = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer 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' },
                    body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: [{ role: 'system', content: window.humeurInfo.personnalite }, ...historique] })
                });
                const data = await rep.json();
                const reponse = data.choices[0].message.content;
                historique.push({"role": "assistant", "content": reponse});
                ajouterMessageBot(reponse);
            }
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }
    </script>
</body>
</html>
