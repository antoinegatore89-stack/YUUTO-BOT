<!DOCTYPE html>
<html>
<head>
    <title>YUUTO</title>
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dx9hrtugr/image/upload/v1774477095/Fait_moi_un_cercle_un_peu_comme_chat_gpt_mais_fa%C3%A7ons_manga_20260325_054242_0000_xiedh6.jpg"/>
    <link rel="icon" href="https://res.cloudinary.com/dx9hrtugr/image/upload/v1774477095/Fait_moi_un_cercle_un_peu_comme_chat_gpt_mais_fa%C3%A7ons_manga_20260325_054242_0000_xiedh6.jpg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { font-family: Arial; margin: 0; background: #1a1a1a; color: white; }
        #login { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 15px; }
        #login img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
        #login h2 { margin: 0; }
        #login p { color: #aaa; margin: 0; }
        #login input { padding: 12px; border-radius: 20px; border: none; font-size: 16px; width: 250px; text-align: center; background: #333; color: white; }
        #login button { background: #7c3aed; color: white; border: none; padding: 12px 30px; border-radius: 20px; font-size: 16px; }
        #erreur { color: red; display: none; }
        #app { display: none; flex-direction: column; height: 100vh; }
        #header { display: flex; align-items: center; padding: 10px; background: #222; gap: 10px; }
        #header img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        #header span { font-size: 18px; font-weight: bold; }
        #humeur { font-size: 12px; color: #aaa; }
        #chat { flex: 1; overflow-y: auto; padding: 10px; }
        .moi { background: #0084ff; padding: 10px; border-radius: 10px; margin: 5px; text-align: right; }
        .bot { display: flex; align-items: flex-start; gap: 8px; margin: 5px; }
        .bot img.avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .bot-msg { background: #333; padding: 10px; border-radius: 10px; }
        .bot-msg img.generated { max-width: 200px; border-radius: 10px; margin-top: 5px; display: block; }
        .audio-btn { background: none; border: none; color: #aaa; font-size: 14px; cursor: pointer; margin-top: 5px; padding: 0; }
        .audio-btn:hover { color: white; }
        #bas { display: flex; padding: 10px; gap: 5px; }
        #msg { flex: 1; padding: 10px; border-radius: 20px; border: none; font-size: 16px; background: #333; color: white; }
        #btn { background: #7c3aed; color: white; border: none; padding: 10px 15px; border-radius: 20px; font-size: 16px; }
        #micBtn { background: #333; color: white; border: none; padding: 10px 15px; border-radius: 20px; font-size: 20px; }
        #micBtn.active { background: red; }
    </style>
</head>
<body>
    <div id="login">
        <img src="https://res.cloudinary.com/dx9hrtugr/image/upload/v1774477095/Fait_moi_un_cercle_un_peu_comme_chat_gpt_mais_fa%C3%A7ons_manga_20260325_054242_0000_xiedh6.jpg"/>
        <h2>YUUTO</h2>
        <p>Qui es-tu ?</p>
        <input id="nom" type="text" placeholder="Ton prenom..."/>
        <button onclick="seConnecter()">Entrer</button>
        <span id="erreur">Acces refuse 😤</span>
    </div>

    <div id="app">
        <div id="header">
            <img src="https://res.cloudinary.com/dx9hrtugr/image/upload/v1774477095/Fait_moi_un_cercle_un_peu_comme_chat_gpt_mais_fa%C3%A7ons_manga_20260325_054242_0000_xiedh6.jpg"/>
            <div>
                <span>YUUTO</span><br/>
                <span id="humeur"></span>
            </div>
        </div>
        <div id="chat"></div>
        <div id="bas">
            <button id="micBtn" onclick="toggleMic()">🎤</button>
            <input id="msg" type="text" placeholder="Ecris ou parle..."/>
            <button id="btn" onclick="envoyer()">Envoyer</button>
        </div>
    </div>

    <script>
        const AVATAR = "https://res.cloudinary.com/dx9hrtugr/image/upload/v1774477095/Fait_moi_un_cercle_un_peu_comme_chat_gpt_mais_fa%C3%A7ons_manga_20260325_054242_0000_xiedh6.jpg";
        const historique = [];
        let loadingId = 0;
        let estAntoine = false;
        let memoire = {};
        let recognition = null;
        let isListening = false;

        function initMic() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return;
            recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';
            recognition.continuous = false;
            recognition.onresult = (e) => {
                document.getElementById('msg').value = e.results[0][0].transcript;
                stopMic();
                envoyer();
            };
            recognition.onend = () => stopMic();
        }

        function toggleMic() {
            if (isListening) stopMic();
            else startMic();
        }

        function startMic() {
            if (!recognition) { alert("Micro non supporte"); return; }
            recognition.start();
            isListening = true;
            document.getElementById('micBtn').classList.add('active');
            document.getElementById('micBtn').textContent = '🔴';
        }

        function stopMic() {
            if (recognition) recognition.stop();
            isListening = false;
            document.getElementById('micBtn').classList.remove('active');
            document.getElementById('micBtn').textContent = '🎤';
        }

        function parler(texte) {
            const synth = window.speechSynthesis;
            if (!synth) return;
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(texte);
            utterance.lang = 'fr-FR';
            utterance.rate = 0.85;
            utterance.pitch = 1.3;
            utterance.volume = 1;
            synth.speak(utterance);
        }

        function nettoyerTexte(texte) {
            return texte.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '').replace(/'/g, "\\'");
        }

        function ajouterMessageBot(texte) {
            const texteNettoy = nettoyerTexte(texte);
            document.getElementById('chat').innerHTML += `
                <div class="bot">
                    <img class="avatar" src="${AVATAR}"/>
                    <div class="bot-msg">
                        YUUTO : ${texte}
                        <br><button class="audio-btn" onclick="parler('${texteNettoy}')">🔊 Ecouter</button>
                    </div>
                </div>`;
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }

        function chargerMemoire() {
            const data = localStorage.getItem('yuuto_memoire');
            if (data) memoire = JSON.parse(data);
        }

        function sauvegarderMemoire() {
            localStorage.setItem('yuuto_memoire', JSON.stringify(memoire));
        }

        function getMemoireTexte() {
            if (Object.keys(memoire).length === 0) return "";
            let texte = "Voici ce que tu sais sur cette personne : ";
            if (memoire.animes) texte += `ses animes preferes sont ${memoire.animes}. `;
            if (memoire.jeux) texte += `ses jeux preferes sont ${memoire.jeux}. `;
            if (memoire.prenom) texte += `son prenom est ${memoire.prenom}. `;
            return texte;
        }

        const baseFamilier = "Tu es le meilleur ami de la personne depuis toujours. Tu parles comme un vrai pote, tres familier, tu dis 'bro', 'ptdr', 'oe', 'nah', 'wsh'. Tes reponses sont courtes et naturelles. Parfois tu reponds juste 'nah flemme' ou 'bof pas envie lol' mais seulement de temps en temps. Tu utilises des emojis. Tu reponds en francais.";
        const baseNormal = "Tu es YUUTO, un assistant sympa et timide qui adore les animes. Tu es poli. Tu utilises des emojis. Tu reponds en francais.";

        function getHumeur(familier) {
            const heure = new Date().getHours();
            const base = familier ? baseFamilier : baseNormal;
            const memTxt = getMemoireTexte();
            if (heure >= 6 && heure < 12) return {
                humeur: "😴 Encore endormi...",
                personnalite: "Tu es YUUTO qui adore les animes. Le matin t'es endormi. " + memTxt + base
            };
            if (heure >= 12 && heure < 18) return {
                humeur: "⚡ Energique !",
                personnalite: "Tu es YUUTO qui adore les animes. L'apres-midi t'es energique. " + memTxt + base
            };
            if (heure >= 18 && heure < 22) return {
                humeur: "🌙 Calme et philosophe",
                personnalite: "Tu es YUUTO qui adore les animes. Le soir t'es calme et philosophe. " + memTxt + base
            };
            return {
                humeur: "✨ Mysterieux...",
                personnalite: "Tu es YUUTO qui adore les animes. La nuit t'es mysterieux. " + memTxt + base
            };
        }

        function seConnecter() {
            const nom = document.getElementById('nom').value.trim();
            if (nom.toLowerCase() === "antoine gatore") {
                estAntoine = true;
                memoire.prenom = "Antoine";
            } else if (nom.length > 0) {
                estAntoine = false;
                memoire.prenom = nom;
            } else {
                document.getElementById('erreur').style.display = 'block';
                return;
            }
            chargerMemoire();
            demarrer();
        }

        function demarrer() {
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            initMic();

            const humeurInfo = getHumeur(estAntoine);
            document.getElementById('humeur').textContent = humeurInfo.humeur;
            window.humeurInfo = humeurInfo;

            const dejaVenu = memoire.visites && memoire.visites > 0;
            memoire.visites = (memoire.visites || 0) + 1;
            sauvegarderMemoire();

            let intro = "";
            if (estAntoine) {
                intro = dejaVenu ? `wsh Antoine ! 😄 t'es de retour ! quoi de neuf ?` : `YOOO 🔥 t'es la ! j'suis chaud, on cause de quoi ?`;
            } else {
                intro = dejaVenu ? `Salut ${memoire.prenom} ! 😊 Content de te revoir !` : `Salut ${memoire.prenom} ! 😊 Je suis YUUTO. Comment je peux t'aider ?`;
            }

            const texteNettoy = nettoyerTexte(intro);
            document.getElementById('chat').innerHTML = `
                <div class="bot">
                    <img class="avatar" src="${AVATAR}"/>
                    <div class="bot-msg">
                        ${intro}
                        <br><button class="audio-btn" onclick="parler('${texteNettoy}')">🔊 Ecouter</button>
                    </div>
                </div>`;
        }

        async function envoyer() {
            const msg = document.getElementById('msg').value;
            if (!msg) return;
            document.getElementById('msg').value = '';
            document.getElementById('chat').innerHTML += `<div class="moi">${msg}</div>`;

            const msgLower = msg.toLowerCase();
            if (msgLower.includes('j\'aime') || msgLower.includes('mon anime')) {
                memoire.animes = msg;
                sauvegarderMemoire();
            }
            if (msgLower.includes('mon jeu') || msgLower.includes('je joue a')) {
                memoire.jeux = msg;
                sauvegarderMemoire();
            }

            if (msgLower.includes('genere') || msgLower.includes('génère') || msgLower.includes('image de')) {
                const prompt = msg.replace(/genere|génère|une image de|image de|image/gi, '').trim() + ' anime manga style, high quality, detailed, 4k';
                loadingId++;
                const currentId = 'loading' + loadingId;
                document.getElementById('chat').innerHTML += `
                    <div class="bot">
                        <img class="avatar" src="${AVATAR}"/>
                        <div class="bot-msg" id="${currentId}">${estAntoine ? 'oe attends... 🎨' : 'Generation en cours... 🎨'}</div>
                    </div>`;
                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                try {
                    const image = await puter.ai.txt2img(prompt);
                    document.getElementById(currentId).innerHTML = `${estAntoine ? 'tiens 🎨' : 'Voila 🎨'}<br><img class="generated" src="${image.src}"/>`;
                } catch(e) {
                    document.getElementById(currentId).innerHTML = estAntoine ? "nah flemme 😅" : "Desole 😅";
                }
            } else {
                historique.push({"role": "user", "content": msg});
                const rep = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer 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'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: [
                            {role: 'system', content: window.humeurInfo.personnalite},
                            ...historique
                        ]
                    })
                });
                const data = await rep.json();
                const reponse = data.choices[0].message.content;
                historique.push({"role": "assistant", "content": reponse});
                ajouterMessageBot(reponse);
            }
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        }
    </script>
</body>
</html
